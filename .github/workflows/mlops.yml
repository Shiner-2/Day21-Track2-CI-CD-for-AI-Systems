name: MLOps Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'data/**.dvc'
      - 'src/**.py'
      - 'params.yaml'
  workflow_dispatch:

jobs:

  # JOB 1: Chay unit tests tren du lieu ao (khong can cloud)
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  # JOB 2: Huan luyen mo hinh tren du lieu thuc, upload model len S3
  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull data with DVC
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: |
          dvc pull

      - name: Train model
        env:
          MLFLOW_TRACKING_URI: "sqlite:///mlflow.db"
          MLFLOW_ARTIFACT_ROOT: "./mlartifacts"
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        run: |
          python - <<'EOF'
          import json, os
          with open("outputs/metrics.json") as f:
              metrics = json.load(f)
          acc = metrics["accuracy"]
          f1  = metrics["f1_score"]
          print(f"Accuracy: {acc:.4f} | F1: {f1:.4f}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as fout:
              fout.write(f"accuracy={acc}\n")
          EOF

      - name: Upload model to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}
        run: |
          python - <<'EOF'
          import boto3
          import os
          s3 = boto3.client("s3")
          s3.upload_file("models/model.pkl", os.environ["CLOUD_BUCKET"], "models/latest/model.pkl")
          print("Model uploaded to S3 successfully!")
          EOF

      - name: Save metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: outputs/metrics.json

  # JOB 3: Kiem tra chat luong - chi cho phep deploy khi accuracy >= 0.70
  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:
      - name: Check eval gate
        run: |
          python - <<'EOF'
          import sys
          accuracy = float("${{ needs.train.outputs.accuracy }}")
          threshold = 0.70
          print(f"Accuracy:  {accuracy:.4f}")
          print(f"Threshold: {threshold:.2f}")
          print("-" * 30)
          if accuracy < threshold:
              print(f"BLOCKED: {accuracy:.4f} < {threshold} -- Deploy bi chan tu dong!")
              sys.exit(1)
          else:
              print(f"PASSED: {accuracy:.4f} >= {threshold} -- Chuan bi deploy!")
          EOF

  # JOB 4: Deploy - copy code len EC2 va restart systemd service
  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy serve.py to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "src/serve.py"
          target: "/home/${{ secrets.VM_USER }}/"

      - name: Restart FastAPI service on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            sudo systemctl restart mlops-serve
            echo "Waiting for server to load model..."
            sleep 10
            sudo systemctl status mlops-serve --no-pager

      - name: Health check - GET /health
        run: |
          HEALTH=$(curl -sf http://${{ secrets.VM_HOST }}:8000/health)
          echo "Health response: $HEALTH"
          if echo "$HEALTH" | grep -q "ok"; then
            echo "Health check PASSED"
          else
            echo "Health check FAILED"
            exit 1
          fi

      - name: Predict check - POST /predict
        run: |
          RESULT=$(curl -sf -X POST http://${{ secrets.VM_HOST }}:8000/predict \
            -H "Content-Type: application/json" \
            -d '{"features": [7.4, 0.7, 0.0, 1.9, 0.076, 11.0, 34.0, 0.9978, 3.51, 0.56, 9.4, 0]}')
          echo "Predict response: $RESULT"
          if echo "$RESULT" | grep -q "prediction"; then
            echo "Predict check PASSED"
          else
            echo "Predict check FAILED"
            exit 1
          fi
