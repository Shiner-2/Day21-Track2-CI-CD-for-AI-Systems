name: MLOps Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'data/**.csv'
      - 'src/**.py'
      - 'params.yaml'
  workflow_dispatch:

jobs:

  # JOB 1: Chay unit tests tren du lieu ao (khong can GCS)
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  # JOB 2: Huan luyen mo hinh tren du lieu thuc
  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train model
        env:
          MLFLOW_TRACKING_URI: "sqlite:///mlflow.db"
          MLFLOW_ARTIFACT_ROOT: "./mlartifacts"
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        run: |
          python - <<'EOF'
          import json, os
          with open("outputs/metrics.json") as f:
              metrics = json.load(f)
          acc = metrics["accuracy"]
          print(f"Accuracy: {acc:.4f}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"accuracy={acc}\n")
          EOF

      - name: Upload model as artifact
        uses: actions/upload-artifact@v4
        with:
          name: model
          path: models/model.pkl

      - name: Save metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: outputs/metrics.json

  # JOB 3: Kiem tra chat luong - chi deploy khi accuracy >= 0.70
  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:
      - name: Check eval gate
        run: |
          python - <<'EOF'
          import sys
          accuracy = float("${{ needs.train.outputs.accuracy }}")
          threshold = 0.70
          print(f"Accuracy: {accuracy:.4f} | Threshold: {threshold}")
          if accuracy < threshold:
              print(f"FAILED: accuracy {accuracy:.4f} < {threshold} -- deploy bi chan!")
              sys.exit(1)
          else:
              print(f"PASSED: accuracy {accuracy:.4f} >= {threshold} -- tien hanh deploy!")
          EOF

  # JOB 4: Deploy qua SSH vao may local (qua ngrok)
  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          port: ${{ secrets.VM_PORT }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd "${{ secrets.VM_WORKDIR }}"
            pkill -f "uvicorn" || true
            sleep 2
            nohup .venv310/Scripts/python -m uvicorn src.serve:app --host 0.0.0.0 --port 8000 > /tmp/serve.log 2>&1 &
            sleep 5
            HEALTH=$(curl -s http://localhost:8000/health || echo "failed")
            echo "Health check: $HEALTH"
            if echo "$HEALTH" | grep -q "ok"; then
              echo "Deploy thanh cong!"
            else
              echo "Health check that bai!"
              exit 1
            fi
